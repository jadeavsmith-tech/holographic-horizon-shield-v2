version: '3.8'

services:
  horizon-shield-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: holographic_horizon_shield_v2
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
